services:
  backend:
    build: ./backend
    container_name: arkclaw-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      HOST: 0.0.0.0
      PORT: "8000"
      CORS_ORIGINS: "*"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status==200 else 1)"]
      interval: 10s
      timeout: 3s
      retries: 6

  widget:
    build: ./widget
    container_name: arkclaw-widget
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy
